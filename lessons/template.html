<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>$title$ | Anti-Gravity Academy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-dark: #020617;
        --card-bg: rgba(30, 41, 59, 0.5);
        --accent-primary: #38bdf8;
        --accent-secondary: #818cf8;
        --text-main: #f8fafc;
        --text-dim: #94a3b8;
        --glass-border: rgba(255, 255, 255, 0.1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background-color: var(--bg-dark);
        background-image:
          radial-gradient(
            circle at 20% 20%,
            rgba(56, 189, 248, 0.05) 0%,
            transparent 25%
          ),
          radial-gradient(
            circle at 80% 80%,
            rgba(129, 140, 248, 0.05) 0%,
            transparent 25%
          );
        color: var(--text-main);
        min-height: 100vh;
        line-height: 1.6;
      }

      .container {
        max-width: 900px;
        margin: 0 auto;
        padding: 60px 20px;
      }

      header {
        margin-bottom: 40px;
        border-bottom: 1px solid var(--glass-border);
        padding-bottom: 20px;
      }

      .back-link {
        color: var(--accent-primary);
        text-decoration: none;
        font-size: 0.875rem;
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 20px;
        transition: opacity 0.2s;
      }

      .back-link:hover {
        opacity: 0.8;
      }

      h1, h2, h3, h4 {
        color: var(--text-main);
        margin-top: 2rem;
        margin-bottom: 1rem;
      }

      h1 {
        font-size: 2.5rem;
        font-weight: 800;
        background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      p {
        margin-bottom: 1.25rem;
        color: var(--text-dim);
      }

      code {
        background: var(--card-bg);
        padding: 0.2em 0.4em;
        border-radius: 6px;
        font-family: monospace;
        font-size: 0.9em;
        border: 1px solid var(--glass-border);
      }

      pre {
        background: var(--card-bg);
        padding: 20px;
        border-radius: 12px;
        overflow-x: auto;
        border: 1px solid var(--glass-border);
        margin: 1.5rem 0;
      }

      pre code {
        background: none;
        padding: 0;
        border: none;
        font-size: 0.9rem;
      }

      ul, ol {
        margin-bottom: 1.25rem;
        padding-left: 1.5rem;
        color: var(--text-dim);
      }

      li {
        margin-bottom: 0.5rem;
      }

      blockquote {
        border-left: 4px solid var(--accent-primary);
        padding-left: 20px;
        margin: 1.5rem 0;
        font-style: italic;
      }

      img {
        max-width: 100%;
        border-radius: 12px;
        margin: 1.5rem 0;
        border: 1px solid var(--glass-border);
      }

      .footer {
        margin-top: 60px;
        padding-top: 20px;
        border-top: 1px solid var(--glass-border);
        text-align: center;
        font-size: 0.875rem;
        color: var(--text-dim);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <a href="../index.html" class="back-link">← Назад к списку уроков</a>
      </header>
      <main>
        $body$
      </main>
      <footer class="footer">
        Anti-Gravity Academy &copy; 2026
      </footer>
    </div>
  </body>
</html>
